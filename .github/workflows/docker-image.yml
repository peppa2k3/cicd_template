env:
  DOCKER_HUB_REPO: peppa2k3/profile_website_fe
  IMAGE_FE_NAME: profile_website_fe
  IMAGE_BE_NAME: profile_website_be
name: CI-CD

on:
  push:
    branches: ["develop"]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Set version
        run: |
          echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_ENV
      - name: build & push client
        run: |
          docker build --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} -t ${{env.DOCKER_HUB_REPO}}${{env.IMAGE_FE_NAME}}:${{env.VERSION}} ./client
          docker push ${{env.DOCKER_HUB_REPO}}${{env.IMAGE_FE_NAME}}:${{env.VERSION}}
      - name: build & push backend
        run: |
          docker build -t ${{env.DOCKER_HUB_REPO}}${{env.IMAGE_BE_NAME}}:${{env.VERSION}} ./backend
          docker push ${{env.DOCKER_HUB_REPO}}${{env.IMAGE_BE_NAME}}:${{env.VERSION}}
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.VPS_HOST}}
          username: ${{secrets.VPS_USER}}
          key: ${{secrets.VPS_KEY}}
          script: |
            cd /opt/profile
            docker compose down
            echo "IMAGE_FE_TAG=${{env.DOCKER_HUB_REPO}}${{env.IMAGE_BE_NAME}}:${{env.VERSION}} "> .env
            echo "IMAGE_BE_TAG=${{env.DOCKER_HUB_REPO}}${{env.IMAGE_BE_NAME}}:${{env.VERSION}} ">> .env
            git pull
            docker compose pull
            docker compose up -d
            docker image prune -f
