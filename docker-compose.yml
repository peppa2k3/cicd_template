version: "3.8"
services:
  frontend:
    image: ${IMAGE_FE_TAG}
    container_name: profile_fe
    restart: always

    labels:
      - "traefik.enable=true"

      # Router HTTPS
      - "traefik.http.routers.profile.rule=Host(`profile.dangngochai.io.vn`)"
      - "traefik.http.routers.profile.entrypoints=websecure"
      - "traefik.http.routers.profile.tls=true"
      - "traefik.http.routers.profile.tls.certresolver=le"

      # Service port trong container
      - "traefik.http.services.profile.loadbalancer.server.port=80"
    networks:
      - web

  backend:
    image: ${ IMAGE_BE_TAG}
    container_name: profile_be
    env_file:
      - ./env/backend.env
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.profile.dangngochai.io.vn`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
networks:
  web:
    external: true
